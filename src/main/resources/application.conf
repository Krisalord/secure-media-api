ktor {
  application {
    modules = [ "io.github.krisalord.ApplicationKt.module" ]
  }

  deployment {
    port = 8080
    port = ${PORT}
  }

  database {
    driverClassName = "org.postgresql.Driver"
    jdbcUrl = ${DB_URL}
    username = ${DB_USER}
    password = ${DB_PASSWORD}
    maximumPoolSize = 10
  }

  jwt {
    secret = ${JWT_SECRET}
    issuer = ${JWT_ISSUER}
    audience = ${JWT_AUDIENCE}
    accessValidityMs = 120000
  }

  refreshToken {
    validityDays = 7
    reuseDetectionEnabled = true
    maxSessionsPerUser = 5
    tokenHashPepper = ${TOKEN_PEPPER}
  }

  cors {
    allowedHosts = [ ${FRONTEND_URL}, "localhost:5173", "localhost:3000" ]
  }

  cookies {
    secure = false
    sameSite = "Strict"
  }

  ai {
    geminiApiKey = ${GEMINI_API_KEY}
  }
}