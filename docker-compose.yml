version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: local-postgres
    environment:
      POSTGRES_DB: auth_dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: